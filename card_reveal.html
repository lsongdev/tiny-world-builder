<script>
const THREE_NS = window.THREE;

/* ============================================================
   PACK DATA — replace #pack-data JSON or window.TINYWORLD_PACK_DATA
   ============================================================ */
const CARD_SHEET_URL = 'cards.jpeg';
const PACK_WRAPPER_URL = 'assets/pack-wrapper-foil.png';
const CARD_BACK_CROPS = [
  { x: 58, y: 108, w: 298, h: 402 },
  { x: 423, y: 108, w: 298, h: 402 },
  { x: 788, y: 108, w: 314, h: 402 },
  { x: 1168, y: 108, w: 290, h: 402 },
  { x: 58, y: 556, w: 298, h: 406 },
  { x: 423, y: 556, w: 298, h: 406 },
  { x: 788, y: 556, w: 314, h: 406 },
  { x: 1168, y: 556, w: 290, h: 406 },
];
const RARITY_COLOR = {
  COMMON:'#9aa7b3',
  UNCOMMON:'#7fd34f',
  RARE:'#4f9fe0',
  EPIC:'#b054e0',
  LEGENDARY:'#e0a93a',
  BONUS:'#e06a3a',
};
const KIND_LABEL = {
  island: 'ISLAND',
  artifact: 'ARTIFACT',
  sticker: 'STICKER',
  bonus: 'BONUS ITEM',
};
const DEFAULT_COLORS = [
  ['#7fd34f', '#3a6b22', 'tree'],
  ['#4f9fe0', '#1f5a8a', 'wave'],
  ['#a069e0', '#5a2f8a', 'shield'],
  ['#e0b454', '#8a6a1f', 'compass'],
  ['#c8d4e0', '#5a6573', 'mountain'],
  ['#b054e0', '#6a1f8a', 'orb'],
  ['#4fc3f0', '#1f6a8a', 'floating'],
  ['#e06a3a', '#8a3a1f', 'volcano'],
];

function normalizeHex(value, fallback){
  if(typeof value !== 'string') return fallback;
  const trimmed = value.trim();
  return /^#[0-9a-f]{6}$/i.test(trimmed) ? trimmed : fallback;
}
function colorHexToNumber(hex){
  return parseInt(hex.replace('#',''), 16);
}
function rarityKey(value){
  const key = String(value || 'Common').trim().toUpperCase();
  return RARITY_COLOR[key] ? key : 'COMMON';
}
function normalizeStats(stats){
  if(!stats || typeof stats !== 'object') return { Value: 5 };
  const out = {};
  Object.entries(stats).slice(0, 3).forEach(([key, value])=>{
    const label = String(key || 'Stat').slice(0, 18);
    out[label] = value;
  });
  return Object.keys(out).length ? out : { Value: 5 };
}
function normalizePackCard(card, idx){
  const defaults = DEFAULT_COLORS[idx % DEFAULT_COLORS.length];
  const accent = normalizeHex(card && card.accent, defaults[0]);
  const rim = normalizeHex(card && card.rim, defaults[1]);
  const kind = String((card && card.kind) || 'island').toLowerCase();
  const safeKind = KIND_LABEL[kind] ? kind : 'island';
  const name = String((card && card.name) || `Card ${idx + 1}`).trim();
  return {
    id: String((card && card.id) || name.toLowerCase().replace(/[^a-z0-9]+/g,'-') || `card-${idx + 1}`),
    kind: safeKind,
    name: name.toUpperCase(),
    displayName: name,
    rarity: rarityKey(card && card.rarity),
    backIndex: Number.isFinite(card && card.backIndex) ? card.backIndex : idx,
    accent,
    rim,
    glow: colorHexToNumber(accent),
    icon: String((card && card.icon) || defaults[2]),
    description: String((card && card.description) || '').slice(0, 130),
    tags: Array.isArray(card && card.tags) ? card.tags.slice(0, 3).map(tag => String(tag).toUpperCase()) : [],
    reward: String((card && card.reward) || ''),
    quantity: Number.isFinite(card && card.quantity) ? card.quantity : null,
    stats: normalizeStats(card && card.stats),
  };
}
function normalizePackConfig(raw){
  const data = raw && typeof raw === 'object' ? raw : {};
  const cards = Array.isArray(data.cards) ? data.cards : [];
  return {
    packTitle: String(data.packTitle || 'TinyWorld Builder'),
    packSubtitle: String(data.packSubtitle || 'Island Collection · Booster Pack'),
    packLabel: String(data.packLabel || `${Math.max(1, cards.length)} Cards`),
    cards: cards.length ? cards.map(normalizePackCard) : DEFAULT_COLORS.slice(0, 5).map((colors, i)=>normalizePackCard({
      name: ['Forest Realm','River Kingdom','Fortress Isle','Mystic Grove','Bonus Cache'][i] || `Card ${i + 1}`,
      backIndex: i,
      accent: colors[0],
      rim: colors[1],
      icon: colors[2],
      rarity: i === 4 ? 'Bonus' : 'Common',
      kind: i === 4 ? 'bonus' : 'island',
      stats: { Growth: 5 + i, Defense: 4, Mana: 3 + i },
    }, i)),
  };
}
function loadPackConfig(){
  if(window.TINYWORLD_PACK_DATA) return normalizePackConfig(window.TINYWORLD_PACK_DATA);
  const node = document.getElementById('pack-data');
  if(node){
    try { return normalizePackConfig(JSON.parse(node.textContent)); }
    catch(err){ console.warn('Pack JSON failed to parse, using fallback data.', err); }
  }
  return normalizePackConfig(null);
}
const PACK_CONFIG = loadPackConfig();

/* ============================================================
   PROCEDURAL TEXTURE GENERATION (canvas)
   ============================================================ */
const CW = 512, CH = 716; // card aspect

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function stoneFrame(ctx){
  // dark stone/wood frame base
  const g = ctx.createLinearGradient(0,0,CW,CH);
  g.addColorStop(0,'#14171c'); g.addColorStop(0.5,'#0a0c10'); g.addColorStop(1,'#121419');
  ctx.fillStyle = g; roundRect(ctx,0,0,CW,CH,40); ctx.fill();

  // stone speckle
  ctx.save(); roundRect(ctx,0,0,CW,CH,40); ctx.clip();
  for(let i=0;i<700;i++){
    const x=Math.random()*CW, y=Math.random()*CH, s=Math.random()*2.4;
    ctx.fillStyle=`rgba(${120+Math.random()*40|0},${120+Math.random()*40|0},${130+Math.random()*40|0},${Math.random()*0.05})`;
    ctx.fillRect(x,y,s,s);
  }
  // cracks
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1.2;
  for(let i=0;i<14;i++){
    ctx.beginPath();
    let x=Math.random()*CW, y=Math.random()*CH;
    ctx.moveTo(x,y);
    for(let j=0;j<5;j++){ x+=(Math.random()-0.5)*70; y+=(Math.random()-0.5)*70; ctx.lineTo(x,y); }
    ctx.stroke();
  }
  ctx.restore();
}

function metalCorners(ctx, accent){
  // four metal corner brackets with rivets
  const inset=18, len=92, t=20;
  ctx.fillStyle='#2e3540';
  const corners=[[inset,inset,1,1],[CW-inset,inset,-1,1],[inset,CH-inset,1,-1],[CW-inset,CH-inset,-1,-1]];
  corners.forEach(([cx,cy,sx,sy])=>{
    ctx.save(); ctx.translate(cx,cy); ctx.scale(sx,sy);
    // L-bracket
    const grd=ctx.createLinearGradient(0,0,len,len);
    grd.addColorStop(0,'#4a5462'); grd.addColorStop(1,'#262c34');
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,len,t); ctx.fillRect(0,0,t,len);
    // bevel highlight
    ctx.fillStyle='rgba(255,255,255,0.10)';
    ctx.fillRect(0,0,len,3); ctx.fillRect(0,0,3,len);
    // rivet
    const rg=ctx.createRadialGradient(t/2-2,t/2-2,1,t/2,t/2,9);
    rg.addColorStop(0,'#9fb0c0'); rg.addColorStop(1,'#363d47');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(t/2,t/2,8,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawIcon(ctx, type, cx, cy, R, color){
  ctx.save(); ctx.translate(cx,cy);
  ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=R*0.07;
  ctx.lineJoin='round'; ctx.lineCap='round';
  const sh=(blur)=>{ctx.shadowColor=color;ctx.shadowBlur=blur;};
  sh(R*0.5);
  switch(type){
    case 'tree':
      ctx.beginPath();
      ctx.moveTo(0,-R*0.7);
      ctx.lineTo(R*0.5,R*0.05); ctx.lineTo(R*0.18,R*0.05);
      ctx.lineTo(R*0.5,R*0.45); ctx.lineTo(-R*0.5,R*0.45);
      ctx.lineTo(-R*0.18,R*0.05); ctx.lineTo(-R*0.5,R*0.05);
      ctx.closePath(); ctx.fill();
      ctx.fillRect(-R*0.08,R*0.45,R*0.16,R*0.3); break;
    case 'wave':
      for(let k=-1;k<=1;k++){
        ctx.beginPath();
        for(let a=-R*0.7;a<=R*0.7;a+=4){
          const yy=Math.sin(a/R*Math.PI*2)*R*0.18 + k*R*0.32;
          a===-R*0.7?ctx.moveTo(a,yy):ctx.lineTo(a,yy);
        }
        ctx.stroke();
      } break;
    case 'shield':
      ctx.beginPath();
      ctx.moveTo(0,-R*0.75);
      ctx.lineTo(R*0.55,-R*0.45); ctx.lineTo(R*0.55,R*0.2);
      ctx.quadraticCurveTo(R*0.55,R*0.6,0,R*0.8);
      ctx.quadraticCurveTo(-R*0.55,R*0.6,-R*0.55,R*0.2);
      ctx.lineTo(-R*0.55,-R*0.45); ctx.closePath();
      ctx.lineWidth=R*0.1; ctx.stroke();
      // crown
      ctx.beginPath(); ctx.moveTo(-R*0.28,-R*0.05);
      ctx.lineTo(-R*0.28,-R*0.35); ctx.lineTo(-R*0.1,-R*0.18);
      ctx.lineTo(0,-R*0.4); ctx.lineTo(R*0.1,-R*0.18);
      ctx.lineTo(R*0.28,-R*0.35); ctx.lineTo(R*0.28,-R*0.05);
      ctx.closePath(); ctx.fill(); break;
    case 'compass':
      ctx.beginPath(); ctx.arc(0,0,R*0.7,0,Math.PI*2); ctx.lineWidth=R*0.06; ctx.stroke();
      for(let a=0;a<8;a++){
        const ang=a*Math.PI/4, long=(a%2===0);
        const r1=long?R*0.62:R*0.4;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(Math.cos(ang-0.12)*r1*0.4,Math.sin(ang-0.12)*r1*0.4);
        ctx.lineTo(Math.cos(ang)*r1,Math.sin(ang)*r1);
        ctx.lineTo(Math.cos(ang+0.12)*r1*0.4,Math.sin(ang+0.12)*r1*0.4);
        ctx.closePath(); ctx.fill();
      } break;
    case 'mountain':
      ctx.beginPath();
      ctx.moveTo(-R*0.7,R*0.5);
      ctx.lineTo(-R*0.15,-R*0.6); ctx.lineTo(R*0.1,-R*0.1);
      ctx.lineTo(R*0.35,-R*0.45); ctx.lineTo(R*0.7,R*0.5);
      ctx.closePath(); ctx.lineWidth=R*0.09; ctx.stroke();
      // snow cap
      ctx.fillStyle=color; ctx.beginPath();
      ctx.moveTo(-R*0.15,-R*0.6); ctx.lineTo(-R*0.32,-R*0.25);
      ctx.lineTo(0,-R*0.3); ctx.lineTo(R*0.1,-R*0.1);
      ctx.lineTo(R*0.05,-R*0.42); ctx.closePath(); ctx.fill(); break;
    case 'orb':
      ctx.beginPath(); ctx.arc(0,0,R*0.45,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.5;
      ctx.beginPath(); ctx.arc(0,0,R*0.68,0,Math.PI*2); ctx.lineWidth=R*0.05; ctx.stroke();
      ctx.globalAlpha=1; break;
    case 'floating':
      // floating island chunk
      ctx.beginPath();
      ctx.moveTo(-R*0.55,-R*0.1);
      ctx.lineTo(R*0.55,-R*0.1);
      ctx.lineTo(R*0.3,R*0.2); ctx.lineTo(R*0.1,R*0.55);
      ctx.lineTo(-R*0.1,R*0.25); ctx.lineTo(-R*0.35,R*0.35);
      ctx.closePath(); ctx.fill();
      // tree on top
      ctx.beginPath(); ctx.moveTo(0,-R*0.55); ctx.lineTo(R*0.22,-R*0.12);
      ctx.lineTo(-R*0.22,-R*0.12); ctx.closePath(); ctx.fill(); break;
    case 'volcano':
      ctx.beginPath();
      ctx.moveTo(-R*0.65,R*0.5);
      ctx.lineTo(-R*0.2,-R*0.5); ctx.lineTo(R*0.2,-R*0.5);
      ctx.lineTo(R*0.65,R*0.5); ctx.closePath();
      ctx.lineWidth=R*0.09; ctx.stroke();
      // lava
      ctx.fillStyle=color; ctx.beginPath();
      ctx.moveTo(-R*0.2,-R*0.5); ctx.lineTo(-R*0.05,-R*0.7);
      ctx.lineTo(R*0.05,-R*0.55); ctx.lineTo(R*0.15,-R*0.75);
      ctx.lineTo(R*0.2,-R*0.5); ctx.closePath(); ctx.fill(); break;
    case 'sticker':
      ctx.fillStyle=color;
      roundRect(ctx,-R*0.58,-R*0.42,R*1.16,R*0.84,R*0.18); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.58)';
      ctx.beginPath(); ctx.moveTo(R*0.18,R*0.42); ctx.lineTo(R*0.58,R*0.1); ctx.lineTo(R*0.58,R*0.42); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=R*0.06;
      ctx.beginPath(); ctx.moveTo(-R*0.28,0); ctx.lineTo(-R*0.08,R*0.22); ctx.lineTo(R*0.34,-R*0.22); ctx.stroke(); break;
    case 'star':
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const a=-Math.PI/2+i*Math.PI/5, rr=i%2===0?R*0.72:R*0.32;
        const x=Math.cos(a)*rr, y=Math.sin(a)*rr;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.closePath(); ctx.fill(); break;
    case 'chest':
      ctx.fillStyle=color; roundRect(ctx,-R*0.6,-R*0.18,R*1.2,R*0.62,R*0.08); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-R*0.58,-R*0.18); ctx.quadraticCurveTo(0,-R*0.72,R*0.58,-R*0.18); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.38)'; ctx.lineWidth=R*0.08;
      ctx.beginPath(); ctx.moveTo(-R*0.6,-R*0.16); ctx.lineTo(R*0.6,-R*0.16); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.48)'; roundRect(ctx,-R*0.12,-R*0.08,R*0.24,R*0.28,R*0.04); ctx.fill(); break;
    default:
      ctx.beginPath(); ctx.arc(0,0,R*0.45,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.45;
      ctx.beginPath(); ctx.arc(0,0,R*0.68,0,Math.PI*2); ctx.lineWidth=R*0.05; ctx.stroke();
      ctx.globalAlpha=1; break;
  }
  ctx.restore();
}

function portalRing(ctx, cx, cy, R, color, hexColor){
  ctx.save();
  // outer glow
  const og=ctx.createRadialGradient(cx,cy,R*0.55,cx,cy,R*1.25);
  og.addColorStop(0,'rgba(0,0,0,0)');
  og.addColorStop(0.55,hexToRGBA(hexColor,0.0));
  og.addColorStop(0.72,hexToRGBA(hexColor,0.55));
  og.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=og; ctx.fillRect(cx-R*1.4,cy-R*1.4,R*2.8,R*2.8);
  // main ring
  ctx.shadowColor=hexColor; ctx.shadowBlur=R*0.55;
  ctx.strokeStyle=hexColor; ctx.lineWidth=R*0.12;
  ctx.beginPath(); ctx.arc(cx,cy,R*0.92,0,Math.PI*2); ctx.stroke();
  // bright inner core line
  ctx.shadowBlur=R*0.25; ctx.strokeStyle='#ffffff'; ctx.globalAlpha=0.7; ctx.lineWidth=R*0.04;
  ctx.beginPath(); ctx.arc(cx,cy,R*0.92,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=1; ctx.shadowBlur=0;
  // energy spikes around ring
  ctx.strokeStyle=hexColor; ctx.shadowColor=hexColor; ctx.shadowBlur=R*0.4; ctx.lineWidth=R*0.05;
  for(let a=0;a<12;a++){
    const ang=a*Math.PI/6;
    const r1=R*1.04, r2=R*1.04+R*(0.12+Math.random()*0.16);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(ang)*r1, cy+Math.sin(ang)*r1);
    ctx.lineTo(cx+Math.cos(ang)*r2, cy+Math.sin(ang)*r2);
    ctx.stroke();
  }
  ctx.restore();
}

function hexToRGBA(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines){
  const words = String(text || '').split(/\s+/).filter(Boolean);
  const lines = [];
  let line = '';
  words.forEach((word)=>{
    const test = line ? `${line} ${word}` : word;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if(line) lines.push(line);
  lines.slice(0, maxLines).forEach((txt, idx)=>{
    const trimmed = idx === maxLines - 1 && lines.length > maxLines ? `${txt.replace(/\s+\S+$/,'')}...` : txt;
    ctx.fillText(trimmed, x, y + idx * lineHeight);

function fitText(ctx, text, maxWidth, fontTemplate, maxSize, minSize){

    ctx.font = fontTemplate.replace('{size}', size);
    if(ctx.measureText(text).width <= maxWidth || size <= minSize) break;
    size -= 2;
  } while(size > minSize);
}
function drawTypeBadge(ctx, card, x, y, w){

function statEntries(stats){

function cropForCard(card){

function drawFrontArt(ctx, card, ax, ay, aw, ah){

  else if(card.kind === 'sticker') drawStickerArt(ctx, card, ax, ay, aw, ah);

function drawScene(ctx, card, ax, ay, aw, ah){
  const cx=ax+aw/2, base=ay+ah;
  // clouds
  ctx.fillStyle='rgba(255,255,255,0.25)';
  for(let i=0;i<5;i++){ const x=ax+Math.random()*aw, y=ay+10+Math.random()*ah*0.4, r=18+Math.random()*30;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.arc(x+r*0.8,y+5,r*0.7,0,Math.PI*2); ctx.fill(); }
  // ground / island shape depends on type
  ctx.fillStyle=shade(card.rim,0.1);
  switch(card.icon){
    case 'mountain': case 'volcano':
      ctx.beginPath(); ctx.moveTo(ax,base);
      ctx.lineTo(ax+aw*0.3,base-ah*0.5); ctx.lineTo(ax+aw*0.5,base-ah*0.2);
      ctx.lineTo(ax+aw*0.7,base-ah*0.6); ctx.lineTo(ax+aw,base); ctx.closePath(); ctx.fill();
      if(card.icon==='volcano'){ ctx.fillStyle=hexToRGBA(card.accent,0.9);
        ctx.beginPath(); ctx.arc(ax+aw*0.7,base-ah*0.6,8,0,Math.PI*2); ctx.fill(); }
      break;
    case 'wave':
      ctx.fillStyle=hexToRGBA(card.accent,0.5);
      for(let k=0;k<3;k++){ ctx.beginPath();
        for(let x=ax;x<=ax+aw;x+=6){ const y=base-ah*0.18*k-10+Math.sin((x+k*40)/30)*8; x===ax?ctx.moveTo(x,y):ctx.lineTo(x,y);}
        ctx.lineTo(ax+aw,base); ctx.lineTo(ax,base); ctx.closePath(); ctx.fill(); }
      break;
    case 'floating':
      ctx.beginPath(); ctx.ellipse(cx,base-ah*0.3,aw*0.32,ah*0.12,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-aw*0.22,base-ah*0.3); ctx.lineTo(cx,base-ah*0.02); ctx.lineTo(cx+aw*0.22,base-ah*0.3); ctx.fill();
      // trees
      ctx.fillStyle=shade(card.rim,0.3);
      for(let i=-1;i<=1;i++){ const tx=cx+i*30; ctx.beginPath(); ctx.moveTo(tx,base-ah*0.55); ctx.lineTo(tx+14,base-ah*0.32); ctx.lineTo(tx-14,base-ah*0.32); ctx.closePath(); ctx.fill(); }
      break;
    default:
      ctx.beginPath(); ctx.moveTo(ax,base); ctx.lineTo(ax,base-ah*0.25);
      ctx.quadraticCurveTo(cx,base-ah*0.4,ax+aw,base-ah*0.25); ctx.lineTo(ax+aw,base); ctx.closePath(); ctx.fill();
      // trees/details
      ctx.fillStyle=shade(card.rim,0.35);
      for(let i=0;i<6;i++){ const tx=ax+aw*0.12+i*aw*0.14; const ty=base-ah*0.28-Math.random()*ah*0.05;
        ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+16,ty+34); ctx.lineTo(tx-16,ty+34); ctx.closePath(); ctx.fill(); }
  }
  // central glowing emblem in the art
  ctx.globalAlpha=0.9; drawIcon(ctx, card.icon, cx, ay+ah*0.42, ah*0.16, '#ffffff'); ctx.globalAlpha=1;
}

function shade(hex, amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  if(amt>0){ r+=(255-r)*amt; g+=(255-g)*amt; b+=(255-b)*amt; }
  else { r*=(1+amt); g*=(1+amt); b*=(1+amt); }
  return `rgb(${r|0},${g|0},${b|0})`;
}

  for(let i=0;i<18;i++){

  ctx.strokeStyle='rgba(255,255,255,0.38)'; ctx.lineWidth=2; roundRect(ctx,x+22,y+22,w-44,h-44,22); ctx.stroke();

  ctx.save(); ctx.translate(256,252);
  const med=ctx.createRadialGradient(0,0,18,0,0,154);
  med.addColorStop(0,'rgba(255,242,170,0.7)');
  med.addColorStop(0.48,'rgba(255,204,98,0.24)');
  med.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=med; ctx.fillRect(-170,-170,340,340);
  ctx.strokeStyle='rgba(255,232,142,0.76)'; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(0,0,118,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,0.26)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,126,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(255,227,126,0.86)';
  for(let a=0;a<8;a++){
    const ang=a*Math.PI/4, r=(a%2===0)?126:78;

const cards = [];
function buildCard(card, idx){
  const grp = new T.Group();
  const front = makeFrontTexture(card);
  const back  = makeBackTexture(card);
  const geo = new T.BoxGeometry(CARD_W, CARD_H, CARD_D);
  // material order: +x,-x,+y,-y,+z,-z
  // +z faces the camera at rest -> show the card back first; flip (rot Y = PI) reveals art/stats on -z
  const edgeMat = new T.MeshStandardMaterial({ color:0x1a1f26, roughness:0.5, metalness:0.4, fog:false });
  const backMatObj = new T.MeshBasicMaterial({ map:back, fog:false });
  const frontMatObj = new T.MeshBasicMaterial({ map:front, fog:false });
  const mat = [
    edgeMat, edgeMat, edgeMat, edgeMat,
    backMatObj,   // +z  -> portal back (visible first)
    frontMatObj,  // -z  -> island art + stats (revealed on flip)
  ];
  const mesh = new T.Mesh(geo, mat);
  grp.add(mesh);

  // per-card rim glow sprite
  const gs = new T.Sprite(new T.SpriteMaterial({ map:glowTex, transparent:true, opacity:0, depthWrite:false, color:card.glow }));
  gs.scale.set(5,6,1); gs.position.z=-0.2; grp.add(gs);

  grp.userData = {
    card, idx, mesh, glow:gs, backMat:backMatObj,
    flipped:false, flipTarget:0, hover:0,
    homePos:new T.Vector3(), homeRot:new T.Euler(),
  };
  grp.visible=false;
  scene.add(grp);
  return grp;
}
packData.forEach((card,i)=> cards.push(buildCard(card,i)));

// fan layout positions
function computeFan(){
  const n=cards.length;
  const spread=2.55, arc=0.16, lift=0.24;
  cards.forEach((c,i)=>{
    const t=(i-(n-1)/2);
    c.userData.homePos.set(t*spread, -Math.abs(t)*lift, -Math.abs(t)*0.18);
    c.userData.homeRot.set(0, -t*0.08, -t*arc);
  });
}
computeFan();

let burstParticles = null;

function spawnBurst(){
  const N=160; const g=new T.BufferGeometry();
  const pos=new Float32Array(N*3), vel=[];
  const col=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    pos[i*3]=0; pos[i*3+1]=0; pos[i*3+2]=0;
    const a=Math.random()*Math.PI*2, b=(Math.random()-0.5)*Math.PI;
    const sp=2+Math.random()*5;
    vel.push(new T.Vector3(Math.cos(a)*Math.cos(b)*sp, Math.sin(b)*sp+1, Math.sin(a)*Math.cos(b)*sp));
    const c=new T.Color().setHSL(0.55+Math.random()*0.15,0.8,0.65);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;

  g.setAttribute('position',new T.BufferAttribute(pos,3));
  g.setAttribute('color',new T.BufferAttribute(col,3));
  const m=new T.PointsMaterial({ size:0.18, vertexColors:true, transparent:true, opacity:1, depthWrite:false, blending:T.AdditiveBlending });
  const pts=new T.Points(g,m); scene.add(pts);
  burstParticles={ pts, vel, life:0 };
}
function spawnWrapperShards(){

  for(let i=0;i<34;i++){
    const w=0.18+Math.random()*0.34, h=0.28+Math.random()*0.48;
    const geo=new T.PlaneGeometry(w,h);
    const color=palette[i % palette.length] || 0x4f9fe0;

    });
    const shard=new T.Mesh(geo,mat);
    shard.position.set((Math.random()-0.5)*0.5,(Math.random()-0.5)*0.4,0.72+Math.random()*0.2);
    shard.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    const a=Math.random()*Math.PI*2;
    shard.userData.vel = new T.Vector3(Math.cos(a)*(1.6+Math.random()*4.2), Math.sin(a)*(1.1+Math.random()*3.2)+1.2, (Math.random()-0.5)*2.4);
    shard.userData.spin = new T.Vector3((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);

function openPack(){

}

// pointer pick for flipping
const ray = new T.Raycaster();
const ptr = new T.Vector2();
function pick(clientX, clientY){
  ptr.x=(clientX/window.innerWidth)*2-1;
  ptr.y=-(clientY/window.innerHeight)*2+1;
  ray.setFromCamera(ptr,camera);
  const meshes=cards.filter(c=>c.visible).map(c=>c.userData.mesh);
  const hit=ray.intersectObjects(meshes,false);
  return hit.length? hit[0].object.parent : null;
}

renderer.domElement.addEventListener('pointerdown',(e)=>{
  if(phase==='pack'){ openPack(); return; }
  if(phase!=='fan' && phase!=='inspect') return;
  const c=pick(e.clientX,e.clientY);
  if(!c) { if(phase==='inspect') returnToFan(); return; }
  if(phase==='fan'){ focusOn(c); }
  else if(phase==='inspect'){
    if(c===focusCard){ c.userData.flipTarget = c.userData.flipped?0:1; c.userData.flipped=!c.userData.flipped; }
    else focusOn(c);
  }
});

function focusOn(card){
  phase='inspect'; focusCard=card;
  card.userData.flipTarget = card.userData.flipped?1:0;
  setPrompt('Tap card to flip · tap away to go back');
  setBtn('Back to spread');
}

}

/* ---------- main loop ---------- */
const TMPV = new T.Vector3();
let lastFrameTime = performance.now();
function lerp(a,b,t){ return a+(b-a)*t; }
function damp(cur,tar,lambda,dt){ return lerp(cur,tar,1-Math.exp(-lambda*dt)); }

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min((now-lastFrameTime)/1000,0.05);
  lastFrameTime=now;
  const tphase=(now-t0)/1000;

  // ambient pack float
  if(phase==='intro'||phase==='pack'){
    pack.position.y = Math.sin(now*0.0012)*0.18;
    pack.rotation.y = Math.sin(now*0.0009)*0.18;
    pack.rotation.x = Math.sin(now*0.0011)*0.06;
    const pulse=0.6+Math.sin(now*0.004)*0.2;
    packGlow.material.opacity=pulse;
    pack.scale.setScalar(damp(pack.scale.x, phase==='intro'?0.78:1.28, 6, dt));
  }

  // bursting: pack flies apart, cards scatter then settle into fan
  if(phase==='bursting'){
    // pack scales/fades out
    pack.scale.setScalar(damp(pack.scale.x, 0.01, 8, dt));
    packGlow.material.opacity=damp(packGlow.material.opacity,0,8,dt);
    pack.rotation.z += dt*2;
    if(pack.scale.x<0.05) pack.visible=false;

    // particles
    if(burstParticles){
      burstParticles.life+=dt;
      const p=burstParticles.pts.geometry.attributes.position;
      for(let i=0;i<burstParticles.vel.length;i++){
        const v=burstParticles.vel[i]; v.y-=dt*3.0; // gravity
        p.array[i*3]+=v.x*dt; p.array[i*3+1]+=v.y*dt; p.array[i*3+2]+=v.z*dt;
      }
      p.needsUpdate=true;
      burstParticles.pts.material.opacity=Math.max(0,1-burstParticles.life/1.3);
      if(burstParticles.life>1.4){ scene.remove(burstParticles.pts); burstParticles=null; }
    }

    // cards animate from center to fan with stagger
    let allHome=true;
    cards.forEach((c,i)=>{
      const d=c.userData;
      const delay=i*0.08;
      const lt=Math.max(0,tphase-0.15-delay);
      const k=Math.min(1, lt*1.4);
      const ease=1-Math.pow(1-k,3);
      c.position.lerpVectors(new T.Vector3(0,0,0.3), d.homePos, ease);
      c.rotation.x=lerp(0,d.homeRot.x,ease);
      c.rotation.y=lerp(0,d.homeRot.y,ease);
      c.rotation.z=lerp(0,d.homeRot.z,ease);
      c.scale.setScalar(lerp(0.6,1,ease));
      // back portal lights up as card emerges
      const e=ease;
      d.backMat.emissiveIntensity=lerp(0,0.8,e);
      d.glow.material.opacity=lerp(0,0.6,e);
      if(k<0.999) allHome=false;
    });
    if(allHome && tphase>1.2){ returnToFan(); }
  }

  if(wrapperShards.length){
    for(let i=wrapperShards.length-1;i>=0;i--){
      const shard=wrapperShards[i], d=shard.userData;
      d.life+=dt;
      d.vel.y-=dt*3.2;
      shard.position.addScaledVector(d.vel, dt);
      shard.rotation.x+=d.spin.x*dt;
      shard.rotation.y+=d.spin.y*dt;
      shard.rotation.z+=d.spin.z*dt;
      shard.material.opacity=Math.max(0,0.92-d.life/1.55);
      if(d.life>1.55){
        scene.remove(shard);
        shard.geometry.dispose();
        shard.material.dispose();
        wrapperShards.splice(i,1);
      }
    }
  }

  // fan idle: gentle bob + hover response
  if(phase==='fan'){
    cards.forEach((c,i)=>{
      const d=c.userData;
      const bob=Math.sin(now*0.0015+i*0.7)*0.05;
      c.position.x=damp(c.position.x,d.homePos.x,8,dt);
      c.position.y=damp(c.position.y,d.homePos.y+bob,8,dt);
      c.position.z=damp(c.position.z,d.homePos.z,8,dt);
      c.rotation.x=damp(c.rotation.x,d.homeRot.x,8,dt);
      c.rotation.y=damp(c.rotation.y,d.homeRot.y+Math.sin(now*0.0012+i)*0.02,8,dt);
      c.rotation.z=damp(c.rotation.z,d.homeRot.z,8,dt);
      c.scale.setScalar(damp(c.scale.x,1,8,dt));
      // pulsing portal glow on back
      const pl=0.62+Math.sin(now*0.003+i*1.3)*0.2;
      d.backMat.emissiveIntensity=damp(d.backMat.emissiveIntensity,pl,5,dt);
      d.glow.material.opacity=damp(d.glow.material.opacity,pl*0.9,5,dt);
    });
  }

  // inspect: focused card center+flip, others slide to background
  if(phase==='inspect' && focusCard){
    cards.forEach((c)=>{
      const d=c.userData;
      if(c===focusCard){
        // bring to center front
        c.position.x=damp(c.position.x,0,9,dt);
        c.position.y=damp(c.position.y,0,9,dt);
        c.position.z=damp(c.position.z,2.65,9,dt);
        c.scale.setScalar(damp(c.scale.x,1.28,9,dt));
        // flip rotation toward target
        const targetY = d.flipTarget*Math.PI; // 0=back showing? handle below
        d.rotation_target = targetY;
        c.rotation.x=damp(c.rotation.x,0,9,dt);
        c.rotation.z=damp(c.rotation.z,0,9,dt);
        // smooth flip
        c.rotation.y=damp(c.rotation.y, d.flipTarget*Math.PI, 7, dt);
        // gentle tilt toward pointer for life
        c.rotation.x += Math.sin(now*0.002)*0.02;
        // glow when back faces us
        const backFacing = Math.cos(c.rotation.y)>0;
        d.backMat.emissiveIntensity=damp(d.backMat.emissiveIntensity, backFacing?0.85:0.0, 6, dt);
        d.glow.material.opacity=damp(d.glow.material.opacity, backFacing?0.7:0.1, 6, dt);
      } else {
        // push others back + dim
        const dir=Math.sign(d.homePos.x||0.001);
        c.position.x=damp(c.position.x, d.homePos.x*2.85 + dir*3.4, 7, dt);
        c.position.y=damp(c.position.y, d.homePos.y-0.92, 7, dt);
        c.position.z=damp(c.position.z, -4.2 - Math.abs(d.homePos.x)*0.18, 7, dt);
        c.scale.setScalar(damp(c.scale.x,0.58,7,dt));
        c.rotation.y=damp(c.rotation.y, d.homeRot.y, 7, dt);
        c.rotation.z=damp(c.rotation.z, d.homeRot.z*1.5, 7, dt);
        d.backMat.emissiveIntensity=damp(d.backMat.emissiveIntensity,0.15,5,dt);
        d.glow.material.opacity=damp(d.glow.material.opacity,0.12,5,dt);
      }
    });
  }

  // subtle camera parallax breathing
  camera.position.x = damp(camera.position.x, Math.sin(now*0.0004)*0.4, 2, dt);
  camera.position.y = damp(camera.position.y, Math.cos(now*0.0005)*0.25, 2, dt);
  camera.lookAt(0,0,0);

  // light drift
  rim.position.x = Math.sin(now*0.0008)*6;
  warm.position.y = Math.cos(now*0.0007)*4;

  renderer.render(scene,camera);
}
animate();
</script>
